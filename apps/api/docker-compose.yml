services:
  api:
    build:
      context: ../..
      dockerfile: apps/api/Dockerfile
    ports:
      - "3000:3000"
    env_file:
      - .env
    environment:
      NODE_ENV: production
      PORT: "3000"
      PUBLIC_BASE_URL: "http://localhost:3000"
      UPLOADS_DIR: "/app/uploads"
      TRUST_PROXY: "true"
      ALLOWED_ORIGINS: ""
    volumes:
      - uploads-data:/app/uploads
    restart: unless-stopped

volumes:
  uploads-data:
